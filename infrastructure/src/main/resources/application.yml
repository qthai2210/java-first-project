server:
  port: 8080

spring:
  application:
    name: clean-architecture-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/clean_architecture
    username: postgres
    password: postgrespassword # Change to your actual PostgreSQL password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Enable API docs (Swagger) path
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
