server:
  port: 8080

spring:
  application:
    name: clean-architecture-demo
  profiles:
    active: dev # Default active profile
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:localhost:9200}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

# Logstash Configuration
logstash:
  host: ${LOGSTASH_HOST:localhost}
  port: ${LOGSTASH_PORT:5000}

# Enable API docs (Swagger) path
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Common JWT configuration
app:
  jwt:
    # Token expiration: 24 hours in milliseconds (common to all profiles)
    expiration-ms: 86400000
    # Refresh Token expiration: 7 days in milliseconds (604800000 ms)
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Application Info (exposed via /actuator/info)
info:
  app:
    name: Clean Architecture Demo
    description: Spring Boot REST API with Clean Architecture
    version: 0.0.1-SNAPSHOT

# Rate Limiting Configuration
app:
  rate-limit:
    enabled: true
    capacity: 20
    refill-tokens: 20
    duration-seconds: 60
