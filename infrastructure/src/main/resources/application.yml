server:
  port: 8080

spring:
  application:
    name: clean-architecture-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/clean_architecture
    username: postgres
    password: postgrespassword # Change to your actual PostgreSQL password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Enable API docs (Swagger) path
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT Configuration
app:
  jwt:
    # Secret key: minimum 256 bits (32+ chars). Use env variable in production!
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # Token expiration: 24 hours in milliseconds
    expiration-ms: 86400000
